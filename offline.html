<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#efe3ce">
  <title>English Ladder Offline</title>
  <style>
    :root {
      --bg: #efe3ce;
      --card: rgba(255, 250, 241, 0.92);
      --ink: #25170f;
      --muted: #6f5848;
      --accent: #2f6e52;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(213, 162, 83, 0.22), transparent 30%),
        linear-gradient(180deg, #f4ecdd 0%, var(--bg) 100%);
      color: var(--ink);
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(100%, 420px);
      padding: 24px;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid rgba(37, 23, 15, 0.12);
      box-shadow: 0 20px 50px rgba(63, 43, 28, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 16px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Нет сети</h1>
    <p>Если основная страница уже открывалась раньше, PWA снова заработает как только соединение вернётся.</p>
    <p>Когда сеть появится, вернись на главный экран приложения и обнови страницу.</p>
    <a href="./english-study-coach.html">Открыть снова</a>
  </main>
</body>
</html>
